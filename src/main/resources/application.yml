spring:
  datasource:
    url: jdbc:h2:mem:spectrometer_db
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true

mqtt:
  broker:
    url: tcp://localhost:1883
  client:
    id: spring-boot-backend
  topic: iot/spectrometer/raw
