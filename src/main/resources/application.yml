spring:
  datasource:
    # File-mode H2: data survives server restarts (stored in ./data/spectrometer_db.mv.db)
    url: jdbc:h2:file:./data/spectrometer_db;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update  # 'update' preserves existing rows; 'create-drop' wipes on restart
    show-sql: false
    open-in-view: false   # Disables the JPA open-in-view warning
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false

mqtt:
  broker:
    url: tcp://broker.emqx.io:1883
  client:
    id: ghost-rider-spectrometer
  topic: iot/spectrometer/raw

ai:
  server:
    url: http://localhost:5001

logging:
  level:
    com.spectrometer: DEBUG
    org.springframework.integration.mqtt: WARN
